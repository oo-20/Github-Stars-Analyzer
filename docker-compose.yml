services:
  stars-analyzer:
    build: .
    container_name: github-stars-analyzer
    ports:
      - "5000:5000"
    environment:
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - ./cached_data.json:/app/cached_data.json
    restart: unless-stopped
